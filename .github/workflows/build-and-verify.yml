name: Build and Verify

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
        
    - name: Build package
      run: python -m build
      
    - name: Check package metadata
      run: twine check dist/*
      
    - name: Install wheel
      run: |
        pip install dist/*.whl
        
    - name: Verify executables and imports
      run: |
        profilefusion --help
        ctsh --help
        python -c "import candidate_transformer; print(candidate_transformer.__version__)"
        
    - name: Archive build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: profilefusion-dist
        path: dist/
